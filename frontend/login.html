<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso — Mini Hotel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center" style="background-color:#fdf6ec;">

    <div class="w-full max-w-sm px-4">

        <div class="text-center mb-8">
            <div class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4" style="background-color:#3d1a00;">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-amber-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 21h19.5m-18-18v18m10.5-18v18m6-13.5V21M6.75 6.75h.75m-.75 3h.75m-.75 3h.75m3-6h.75m-.75 3h.75m-.75 3h.75M6.75 21v-3.375c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21M3 3h12m-.75 4.5H21m-3.75 3.75h.008v.008h-.008v-.008zm0 3h.008v.008h-.008v-.008zm0 3h.008v.008h-.008v-.008z" />
                </svg>
            </div>
            <h1 class="text-3xl font-bold" style="color:#3d1a00;">Mini Hotel</h1>
            <p class="text-amber-700 text-sm mt-1 tracking-wide">Sistema de Gestão de Quartos</p>
        </div>

        <div class="bg-white rounded-2xl shadow-md border border-amber-100 p-8">
            <h2 class="text-base font-semibold text-stone-500 mb-6 uppercase tracking-widest text-center">Acesso ao sistema</h2>

            <form id="formLogin" autocomplete="off">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-stone-500 mb-1.5">Usuário</label>
                    <input type="text" id="login"
                        class="w-full px-4 py-3 border border-stone-200 rounded-xl text-stone-800 bg-stone-50 placeholder-stone-300 focus:outline-none focus:ring-2 focus:ring-amber-400 focus:bg-white transition"
                        placeholder="Seu usuário" required>
                </div>
                <div class="mb-7">
                    <label class="block text-sm font-medium text-stone-500 mb-1.5">Senha</label>
                    <input type="password" id="senha"
                        class="w-full px-4 py-3 border border-stone-200 rounded-xl text-stone-800 bg-stone-50 placeholder-stone-300 focus:outline-none focus:ring-2 focus:ring-amber-400 focus:bg-white transition"
                        placeholder="••••••" required>
                </div>
                <button type="submit"
                    class="w-full text-white font-semibold py-3 rounded-xl transition duration-200 active:scale-95"
                    style="background-color:#b45309;" onmouseover="this.style.backgroundColor='#92400e'" onmouseout="this.style.backgroundColor='#b45309'">
                    Entrar
                </button>
            </form>

            <div id="mensagem" class="mt-4 text-center text-sm font-medium hidden"></div>
        </div>

        <p class="text-center text-xs text-stone-400 mt-6">Mini Hotel &copy; 2026</p>
    </div>

    <script>
        document.getElementById('formLogin').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.submitter;
            btn.disabled = true;
            btn.innerText = 'Entrando...';

            fetch('../backend/autenticar.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    login: document.getElementById('login').value,
                    senha: document.getElementById('senha').value
                })
            })
            .then(r => r.json())
            .then(dados => {
                const el = document.getElementById('mensagem');
                el.classList.remove('hidden');
                if (dados.sucesso) {
                    el.className = 'mt-4 text-center text-sm font-medium text-green-600';
                    el.innerText = 'Redirecionando...';
                    setTimeout(() => { window.location.href = 'recepcao.php'; }, 800);
                } else {
                    el.className = 'mt-4 text-center text-sm font-medium text-red-500';
                    el.innerText = dados.mensagem;
                    btn.disabled = false;
                    btn.innerText = 'Entrar';
                }
            });
        });
    </script>
</body>
</html>
