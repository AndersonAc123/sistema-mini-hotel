<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login - Mini Hotel</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #e9ecef; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 100%; max-width: 320px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background: #0056b3; }
        #mensagem { margin-top: 15px; font-weight: bold; color: red; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Acesso ao Sistema</h2>
        <form id="formLogin">
            <input type="text" id="login" placeholder="Usuário" required>
            <input type="password" id="senha" placeholder="Senha" required>
            <button type="submit">Entrar</button>
        </form>
        <div id="mensagem"></div>
    </div>

    <script>
        document.getElementById('formLogin').addEventListener('submit', function(evento) {
            evento.preventDefault();
            
            const dadosLogin = {
                login: document.getElementById('login').value,
                senha: document.getElementById('senha').value
            };

            fetch('../backend/autenticar.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dadosLogin)
            })
            .then(resposta => resposta.json())
            .then(dados => {
                const divMensagem = document.getElementById('mensagem');
                if(dados.sucesso) {
                    divMensagem.style.color = 'green';
                    divMensagem.innerText = 'Redirecionando...';
                    
                    setTimeout(() => {
                        window.location.href = 'recepcao.php'; 
                    }, 1000);
                } else {
                    divMensagem.innerText = dados.mensagem;
                }
            })
            .catch(erro => console.error('Erro:', erro));
        });
    </script>
</body>
</html>
